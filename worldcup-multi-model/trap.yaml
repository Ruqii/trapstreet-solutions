tasks:
  # Local task name == trapstreet task_id (hyphens, as on trapstreet.run/tasks/...).
  # One self-contained solution.py serves every match; list each match's task here.
  worldcup-pan-cro:
    description: Multi-model World Cup predictor (blind) — routes to MODEL (Anthropic / OpenRouter)
    cmd: uv run python solution.py
    traptask:
      local: ../../trapstreet-tasks/tasks/worldcup_pan_cro
    timeout: 120
    file_outputs:
      - usage.json
    solution: claude-opus-4-8        # leaderboard identity — keep in sync with MODEL
    metadata:
      repo: https://github.com/Ruqii/trapstreet-solutions

