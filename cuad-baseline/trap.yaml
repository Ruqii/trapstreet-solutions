tasks:
  # Local task name == trapstreet task_id ("cuad") so `tp submit cuad` Just Works.
  cuad:
    description: Baseline — always answers "NO CLAUSE FOUND" (zero-cost wiring check)
    cmd: python3 solution.py
    traptask:
      local: ../../trapstreet-tasks/tasks/cuad
    timeout: 120
    # Named leaderboard identity. Required as a string by the server on submit
    # (a null/absent solution is rejected with "solution must be a string").
    solution: cuad-baseline
